<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة صندوق العشيرة المتطور</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background-color:#f0f2f5;
margin:0;
padding:0;
}

/* الهيدر */

.header-section{
background:#ffffff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #2c3e50;
gap:20px;
}

.header-text{
text-align:right;
color:#2c3e50;
line-height:1.4;
}

.header-text h1{margin:0;font-size:1.8em;font-weight:900;}
.header-text h2{margin:0;font-size:1.5em;color:#34495e;}
.header-text h3{margin:0;font-size:1.3em;color:#7f8c8d;}

/* Banner العشيرة */

.banner-container{
flex:1;
display:flex;
justify-content:center;
}

.banner-img{
width:420px;
height:120px;
object-fit:cover;
border-radius:12px;
border:3px solid #2c3e50;
box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

/* صورة الشيخ */

.sheikh-photo-container{text-align:center;}

.sheikh-img{
width:120px;
height:120px;
border-radius:15px;
object-fit:cover;
border:3px solid #2c3e50;
background:#eee;
display:block;
}

.upload-btn{
display:none;
margin-top:5px;
font-size:12px;
background:#34495e;
color:white;
padding:5px;
border-radius:5px;
cursor:pointer;
}

/* شريط الإدارة */

.admin-bar{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
}

/* الإحصائيات */

.stats-bar{
background:#ffffff;
padding:20px;
display:flex;
justify-content:space-around;
gap:15px;
border-bottom:3px solid #3498db;
flex-wrap:wrap;
}

.stat-item{
text-align:center;
flex:1;
min-width:180px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
font-weight:bold;
color:#2c3e50;
border:1px solid #ddd;
}

.val{
font-size:1.5em;
font-weight:900;
display:block;
margin-top:8px;
}

.item-prev{background-color:#ecf0f1;border-bottom:5px solid #95a5a6;}
.item-in{background-color:#dff9fb;border-bottom:5px solid #27ae60;color:#27ae60;}
.item-out{background-color:#ffeaa7;border-bottom:5px solid #e67e22;color:#d35400;}
.item-final{background-color:#2c3e50;border-bottom:5px solid #f1c40f;color:#ffffff;}
.item-final .val{color:#f1c40f;}

.item-total-people{
background-color:#8e44ad;
border-bottom:5px solid #dcdde1;
color:#ffffff;
margin-top:10px;
width:100%;
flex:none;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
box-sizing:border-box;
}

/* البحث */

.search-container{
background:#fff;
padding:15px;
text-align:center;
}

.search-input{
width:80%;
max-width:500px;
padding:12px;
border:2px solid #3498db;
border-radius:30px;
outline:none;
text-align:center;
font-size:1em;
}

/* البطاقات */

.member-list{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

.member-card{
background:white;
border-radius:15px;
padding:20px;
width:320px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border-top:5px solid #3498db;
transition:0.3s;
}

.paid-member{background-color:#e8f8f5!important;border-top:5px solid #27ae60!important;}
.unpaid-member{background-color:#fdedec!important;border-top:5px solid #e74c3c!important;}

.family-head-name{
font-size:1.6em;
font-weight:900;
color:#2c3e50;
margin-bottom:8px;
display:block;
}

.family-section{
margin-top:10px;
padding:10px;
background:rgba(0,0,0,0.03);
border-radius:8px;
}

.family-title{
font-size:0.9em;
font-weight:bold;
color:#7f8c8d;
margin-bottom:5px;
display:block;
}

.edit-input{
width:100%;
margin-bottom:10px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
font-weight:bold;
}

.months-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-top:10px;
}

.month-btn{
font-size:0.75em;
padding:5px;
background:#eee;
border-radius:4px;
cursor:pointer;
text-align:center;
border:1px solid #ddd;
}

.month-btn.selected{
background:#8e44ad;
color:white;
border-color:#7d3c98;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
padding:10px 15px;
font-weight:bold;
}

.btn-add{
background:#27ae60;
color:white;
width:280px;
font-size:1.1em;
margin:20px;
}

.btn-save{
background:#3498db;
color:white;
width:100%;
}

.btn-del{
background:#c0392b;
color:white;
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<!-- الهيدر -->

<div class="header-section">

<div class="header-text">
<h1>صندوق الفاتحة لعام 2026</h1>
<h2>عشيرة العبودة</h2>
<h3>ال جهل</h3>
</div>

<div class="banner-container">
<img src="banner-alabooda.jpg" class="banner-img">
</div>

<div class="sheikh-photo-container">
<img id="sheikhImg" src="https://via.placeholder.com/120?text=صورة+الشيخ" class="sheikh-img">
<label for="sheikhUpload" id="uploadLabel" class="upload-btn">تغيير صورة الشيخ 📷</label>
<input type="file" id="sheikhUpload" style="display:none;" accept="image/*" onchange="uploadSheikhPhoto(this)">
</div>

</div>

<!-- شريط الإدارة -->

<div class="admin-bar">
<span id="modeText">📱 وضع المشاهدة</span>
<button id="loginBtn" onclick="openLogin()" style="background:#3498db;color:white;margin-right:15px;">دخول المدير 🔐</button>
<button id="logoutBtn" onclick="location.reload()" style="display:none;background:#95a5a6;color:white;">خروج 🚪</button>
</div>

<!-- الإحصائيات -->

<div class="stats-bar">

<div class="stat-item item-prev">
الرصيد السابق
<span id="prevBalanceVal" class="val">0</span>
</div>

<div class="stat-item item-in">
مجموع دفعات الشهر
<span id="monthlyTotal" class="val">0</span>
</div>

<div class="stat-item item-out">
إجمالي المصروفات
<span id="expenseTotal" class="val">0</span>
</div>

<div class="stat-item item-final">
صافي المتوفر بالصندوق
<span id="finalBalance" class="val">0</span>
</div>

</div>

<div class="search-container">
<input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن اسم رب الأسرة..." onkeyup="render()">
</div>

<div id="membersList" class="member-list"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCcd3U55cFj0QoZW4Fgk6RzHXsijv1mce0",
authDomain:"asheera-e3178.firebaseapp.com",
databaseURL:"https://asheera-e3178-default-rtdb.firebaseio.com",
projectId:"asheera-e3178",
storageBucket:"asheera-e3178.firebasestorage.app",
messagingSenderId:"863501168077",
appId:"1:863501168077:web:7539e176fa4f82140ee884"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let membersData=[];
let isAdmin=false;

db.ref('members').on('value',(s)=>{
membersData=s.val()||[];
render();
});

function render(){

const container=document.getElementById('membersList');
const search=document.getElementById('searchInput').value.toLowerCase();

container.innerHTML='';

membersData.forEach((m,i)=>{

if(m.name.toLowerCase().includes(search)){

const card=document.createElement('div');

card.className='member-card '+(m.paid?'paid-member':'unpaid-member');

card.innerHTML=`
<span class="family-head-name">${m.name}</span>
<p><b>المبلغ:</b> ${Number(m.amount||0).toLocaleString()} د.ع</p>
<p><b>الحالة:</b> ${m.paid?'<b style="color:green">✅ دافع</b>':'<b style="color:red">❌ غير دافع</b>'}</p>
`;

container.appendChild(card);

}

});

}

</script>

</body>
</html>
