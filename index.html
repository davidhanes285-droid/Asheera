<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة العائلة المتطور</title>
    <style>
        :root {
            --primary: #4a90e2;    /* أزرق للإيرادات */
            --danger: #ff6b6b;     /* أحمر للمصروفات */
            --success: #2ecc71;    /* أخضر للرصيد */
            --bg: #f0f2f5;
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        /* الخانات العليا بتصميم بطاقات ملونة */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            padding: 25px;
            border-radius: 20px;
            text-align: center; /* النصوص في الوسط */
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .income { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .expense { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .balance { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .card h3 { margin: 0; font-size: 1.2em; opacity: 0.9; }
        .card p { margin: 10px 0 0; font-size: 2em; font-weight: bold; }

        /* حاوية البيانات */
        .main-content {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* تنسيق قسم العوائل */
        .family-group {
            border: 2px solid #eee;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .family-head {
            background: #f8f9fa;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .family-members { padding: 10px 25px; background: #fff; }
        .member-input {
            border: 1px dashed #ccc;
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            width: 80%;
        }

        /* ميزة التلوين الأخضر عند الدفع */
        .is-paid {
            background-color: #d4edda !important; /* أخضر فاتح */
            border-color: #c3e6cb !important;
        }
        .is-paid * { color: #155724 !important; }

        /* سجل المصروفات */
        .expense-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .expense-table th { padding: 15px; background: #f8f9fa; color: #777; font-weight: 500; }
        .expense-table td { padding: 15px; background: #fff; border-bottom: 1px solid #eee; text-align: center;}
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .admin-badge { background: #333; color: gold; padding: 2px 8px; border-radius: 5px; font-size: 0.7em; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card income">
            <h3>إجمالي المقبوضات</h3>
            <p>3,500 ريال</p>
        </div>
        <div class="card expense">
            <h3>إجمالي المصروفات</h3>
            <p id="totalExpDisplay">450 ريال</p>
        </div>
        <div class="card balance">
            <h3>الرصيد المتبقي</h3>
            <p>3,050 ريال</p>
        </div>
    </div>

    <div class="main-content">
        <h2>إدارة المشتركين <small style="font-size: 0.5em; color: gray;">(المدير فقط يملأ البيانات)</small></h2>
        
        <div class="family-group is-paid">
            <div class="family-head">
