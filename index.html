<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صندوق العشيرة - النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .admin-bar { background: #2c3e50; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; px: 20px; }
        
        .stats-bar { background: #ffffff; padding: 20px; display: flex; justify-content: space-around; gap: 15px; border-bottom: 4px solid #3498db; flex-wrap: wrap; }
        .stat-item { text-align: center; flex: 1; min-width: 200px; padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        
        .val { font-size: 1.5em; font-weight: bold; display: block; margin-top: 10px; }
        .total-in { color: #27ae60; } /* أخضر للمقبوضات */
        .total-out { color: #e74c3c; } /* أحمر للمصروفات */
        .net-box { background: #2c3e50; color: #f1c40f; padding: 10px; border-radius: 8px; }

        .search-container { background: #fff; padding: 20px; text-align: center; }
        .search-input { width: 90%; max-width: 600px; padding: 15px; border: 2px solid #3498db; border-radius: 50px; outline: none; text-align: center; font-size: 1.1em; }
        
        .member-list { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        
        /* ألوان الأعضاء */
        .card-paid { background: #e8f5e9; border: 2px solid #2e7d32; } /* أخضر للدافع */
        .card-unpaid { background: #ffebee; border: 2px solid #c62828; } /* أحمر لغير الدافع */
        
        .member-card { border-radius: 15px; padding: 20px; width: 280px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: right; }
        .edit-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        
        #loginOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: #3498db; color: white; }
        .btn-add { background: #27ae60; color: white; width: 300px; font-size: 1.2em; margin: 30px auto; display: block; }
        .btn-danger { background: #e74c3c; color: white; width: 100%; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>قفل الإدارة</h2>
        <input type="password" id="passInput" class="edit-input" placeholder="أدخل الرمز السري" style="text-align:center;">
        <button onclick="checkLogin()" class="btn-main" style="width:100%; margin-bottom:10px;">دخول</button>
        <button onclick="closeLogin()" style="background:#bdc3c7; width:100%;">إلغاء</button>
    </div>
</div>

<div class="admin-bar">
    <h3 style="margin:0;">صندوق العشيرة</h3>
    <div>
        <span id="modeStatus">👁️ وضع العرض</span>
        <button id="loginBtn" onclick="openLogin()" class="btn-main">دخول المدير</button>
        <button id="logoutBtn" onclick="location.reload()" style="display:none; background:#95a5a6; color:white;">خروج</button>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-item">
        الرصيد السابق في الصندوق
        <div id="prevView"><span id="prevVal" class="val" style="color:#7f8c8d">0</span></div>
        <div id="prevEdit" style="display:none;">
            <input type="number" id="prevInput" class="edit-input" placeholder="ضع المبلغ هنا">
            <button onclick="updatePrevBalance()" class="btn-main" style="padding:5px 15px;">حفظ الرصيد</button>
        </div>
    </div>

    <div class="stat-item">
        مجموع دفعات (الدافعين فقط)
        <span id="paidTotal" class="val total-in">0</span>
    </div>

    <div class="stat-item">
        إجمالي المصروفات
        <span id="expTotal" class="val total-out">0</span>
        <div id="expForm" style="display:none; margin-top:10px; border-top:1px solid #ddd; padding-top:10px;">
            <input type="number" id="newExpAmt" class="edit-input" placeholder="المبلغ">
            <input type="text" id="newExpNote" class="edit-input" placeholder="السبب">
            <button onclick="addNewExpense()" class="btn-danger" style="padding:5px;">إضافة صرف</button>
        </div>
    </div>

    <div class="stat-item net-box">
        صافي المبلغ الحالي
        <span id="netBalance" class="val">0</span>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن اسم ابن العشيرة..." onkeyup="render()">
</div>

<div id="membersList" class="member-list"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcd3U55cFj0QoZW4Fgk6RzHXsijv1mce0",
        authDomain: "asheera-e3178.firebaseapp.com",
        databaseURL: "https://asheera-e3178-default-rtdb.firebaseio.com",
        projectId: "asheera-e3178",
        storageBucket: "asheera-e3178.firebasestorage.app",
        messagingSenderId: "863501168077",
        appId: "1:863501168077:web:7539e176fa4f82140ee884"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    let members = [];
    let finData = { prevBalance: 0, expenses: [] };

    // جلب البيانات من فيربيس
    db.ref('members').on('value', s => { members = s.val() || []; updateSystem(); });
    db.ref('fin_v3').on('value', s => { finData = s.val() || { prevBalance: 0, expenses: [] }; updateSystem(); });

    function updateSystem() {
        // 1. حساب مجموع الدافعين فقط
        let totalPaid = 0;
        members.forEach(m => {
            if(m.paid === true) totalPaid += Number(m.amount || 0);
        });

        // 2. حساب المصروفات
        let totalExp = 0;
        const exps = Array.isArray(finData.expenses) ? finData.expenses : [];
        exps.forEach(e => totalExp += Number(e.amount || 0));

        // 3. الحساب النهائي
        const prev = Number(finData.prevBalance || 0);
        const net = (prev + totalPaid) - totalExp;

        // تحديث الأرقام على الشاشة
        document.getElementById('prevVal').innerText = prev.toLocaleString() + " د.ع";
        document.getElementById('paidTotal').innerText = totalPaid.toLocaleString() + " د.ع";
        document.getElementById('expTotal').innerText = totalExp.toLocaleString() + " د.ع";
        document.getElementById('netBalance').innerText = net.toLocaleString() + " د.ع";

        render();
    }

    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    
    function checkLogin() {
        if(document.getElementById('passInput').value === "1234") {
            isAdmin = true;
            closeLogin();
            document.getElementById('modeStatus').innerText = "✅ لوحة الإدارة";
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('prevEdit').style.display = 'block';
            document.getElementById('prevView').style.display = 'none';
            document.getElementById('expForm').style.display = 'block';
            render();
        } else { alert("رمز خاطئ!"); }
    }

    function updatePrevBalance() {
        const val = document.getElementById('prevInput').value;
        db.ref('fin_v3/prevBalance').set(Number(val));
        alert("تم حفظ الرصيد السابق");
    }

    function addNewExpense() {
        const a = document.getElementById('newExpAmt').value;
        const n = document.getElementById('newExpNote').value;
        if(!a) return;
        const list = Array.isArray(finData.expenses) ? finData.expenses : [];
        list.push({ amount: Number(a), note: n });
        db.ref('fin_v3/expenses').set(list);
        document.getElementById('newExpAmt').value = '';
        document.getElementById('newExpNote').value = '';
    }

    function render() {
        const container = document.getElementById('membersList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = '';

        members.forEach((m, i) => {
            if(m.name.toLowerCase().includes(search)) {
                const card = document.createElement('div');
                // تمييز اللون أخضر أو أحمر
                card.className = `member-card ${m.paid ? 'card-paid' : 'card-unpaid'}`;
                
                if(!isAdmin) {
                    card.innerHTML = `
                        <h3 style="margin-top:0;">${m.name}</h3>
                        <p><b>المبلغ:</b> ${Number(m.amount).toLocaleString()} د.ع</p>
                        <p><b>الحالة:</b> ${m.paid ? '✅ دافع' : '❌ غير دافع'}</p>
                    `;
                } else {
                    card.innerHTML = `
                        <input class="edit-input" value="${m.name}" onchange="updateM(${i},'name',this.value)">
                        <input type="number" class="edit-input" value="${m.amount}" onchange="updateM(${i},'amount',this.value)">
                        <select class="edit-input" onchange="updateM(${i},'paid',this.value==='true')">
                            <option value="false" ${!m.paid?'selected':''}>غير دافع</option>
                            <option value="true" ${m.paid?'selected':''}>دافع</option>
                        </select>
                        <button class="btn-danger" onclick="deleteM(${i})" style="padding:5px;">حذف</button>
                    `;
                }
                container.appendChild(card);
            }
        });

        if(isAdmin) {
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add'; addBtn.innerText = '+ إضافة اسم جديد';
            addBtn.onclick = () => { members.push({name:'اسم جديد', amount:0, paid:false}); db.ref('members').set(members); };
            container.appendChild(addBtn);
        }
    }

    function updateM(i, f, v) { members[i][f] = v; db.ref('members').set(members); }
    function deleteM(i) { if(confirm("حذف؟")) { members.splice(i,1); db.ref('members').set(members); } }
</script>
</body>
</html>
