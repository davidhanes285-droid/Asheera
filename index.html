<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صندوق العشيرة المتطور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .admin-bar { background: #2c3e50; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        .stats-bar { background: #ffffff; padding: 20px; display: flex; justify-content: space-around; gap: 15px; border-bottom: 3px solid #3498db; flex-wrap: wrap; }
        .stat-item { text-align: center; flex: 1; min-width: 180px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; color: #2c3e50; border: 1px solid #ddd; }
        
        .val { font-size: 1.5em; font-weight: 900; display: block; margin-top: 8px; }
        
        .item-prev { background-color: #ecf0f1; border-bottom: 5px solid #95a5a6; }
        .item-in { background-color: #dff9fb; border-bottom: 5px solid #27ae60; color: #27ae60; }
        .item-out { background-color: #ffeaa7; border-bottom: 5px solid #e67e22; color: #d35400; }
        .item-final { background-color: #2c3e50; border-bottom: 5px solid #f1c40f; color: #ffffff; }
        .item-final .val { color: #f1c40f; }
        
        .item-total-people { background-color: #8e44ad; border-bottom: 5px solid #dcdde1; color: #ffffff; margin-top: 10px; width: 100%; flex: none; }

        .search-container { background: #fff; padding: 15px; text-align: center; }
        .search-input { width: 80%; max-width: 500px; padding: 12px; border: 2px solid #3498db; border-radius: 30px; outline: none; text-align: center; font-size: 1em; }
        
        .member-list { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        .member-card { background: white; border-radius: 15px; padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #3498db; transition: 0.3s; }
        .paid-member { background-color: #e8f8f5 !important; border-top: 5px solid #27ae60 !important; }
        .admin-mode-card { border-top: 5px solid #e67e22; }
        
        .family-section { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 8px; }
        .family-title { font-size: 0.9em; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; display: block; }
        .family-input { width: 100%; margin-bottom: 5px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85em; }

        .edit-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        
        #loginOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 15px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #27ae60; color: white; width: 280px; font-size: 1.1em; margin: 20px; }
        .btn-save { background: #3498db; color: white; width: 100%; }
        .btn-del { background: #c0392b; color: white; width: 100%; margin-top: 10px; }
        .btn-family { background: #9b59b6; color: white; font-size: 0.8em; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">دخول لوحة التحكم</h2>
        <input type="password" id="passInput" class="edit-input" placeholder="كلمة المرور" style="text-align:center;">
        <button onclick="checkLogin()" class="btn-save" style="margin-bottom:10px;">دخول</button>
        <button onclick="closeLogin()" style="background:#95a5a6; color:white; width:100%;">إلغاء</button>
    </div>
</div>

<div class="admin-bar">
    <span id="modeText">📱 وضع المشاهدة</span>
    <button id="loginBtn" onclick="openLogin()" style="background:#3498db; color:white; margin-right:15px;">دخول المدير 🔐</button>
    <button id="logoutBtn" onclick="location.reload()" style="display:none; background:#95a5a6; color:white;">خروج 🚪</button>
    <button id="exportBtn" onclick="exportToExcel()" style="display:none; background:#27ae60; color:white;">تقرير Excel 📥</button>
</div>

<div class="stats-bar">
    <div class="stat-item item-prev">الرصيد السابق<span id="prevBalanceVal" class="val">0</span></div>
    <div class="stat-item item-in">مجموع دفعات الشهر<span id="monthlyTotal" class="val">0</span></div>
    <div class="stat-item item-out">إجمالي المصروفات<span id="expenseTotal" class="val">0</span></div>
    <div class="stat-item item-final">صافي المتوفر بالصندوق<span id="finalBalance" class="val">0</span></div>
    
    <div class="stat-item item-total-people">
        إجمالي عدد أفراد العشيرة (النفوس)
        <span id="totalPeopleCount" class="val">0</span>
    </div>

    <div id="prevBalanceEdit" style="display:none; width:100%; text-align:center; margin-top:10px;">
        <input type="number" id="prevBalanceIn" class="edit-input" style="width:200px" placeholder="تعديل الرصيد السابق">
        <button onclick="savePrevBalance()" class="btn-save" style="width:100px;">حفظ</button>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن اسم ابن العشيرة..." onkeyup="render()">
</div>

<div id="membersList" class="member-list"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcd3U55cFj0QoZW4Fgk6RzHXsijv1mce0",
        authDomain: "asheera-e3178.firebaseapp.com",
        databaseURL: "https://asheera-e3178-default-rtdb.firebaseio.com",
        projectId: "asheera-e3178",
        storageBucket: "asheera-e3178.firebasestorage.app",
        messagingSenderId: "863501168077",
        appId: "1:863501168077:web:7539e176fa4f82140ee884"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    let membersData = [];
    let financials = { prevBalance: 0, expenses: [] };

    db.ref('members').on('value', (s) => { membersData = s.val() || []; updateUI(); });
    db.ref('financials_v2').on('value', (s) => { financials = s.val() || { prevBalance: 0, expenses: [] }; updateUI(); });

    function updateUI() {
        let monthlyPaid = 0;
        let totalPeople = 0;

        membersData.forEach(m => { 
            if(m.paid) monthlyPaid += Number(m.amount || 0); 
            // التعديل: حساب رب الأسرة (1) + عدد أفراد عائلته
            totalPeople += 1 + (m.family ? m.family.length : 0);
        });
        
        let totalExp = 0;
        const expArray = Array.isArray(financials.expenses) ? financials.expenses : [];
        expArray.forEach(e => { totalExp += Number(e.amount || 0); });

        const final = (Number(financials.prevBalance || 0) + monthlyPaid) - totalExp;

        document.getElementById('prevBalanceVal').innerText = Number(financials.prevBalance || 0).toLocaleString() + " د.ع";
        document.getElementById('monthlyTotal').innerText = monthlyPaid.toLocaleString() + " د.ع";
        document.getElementById('expenseTotal').innerText = totalExp.toLocaleString() + " د.ع";
        document.getElementById('finalBalance').innerText = final.toLocaleString() + " د.ع";
        document.getElementById('totalPeopleCount').innerText = totalPeople + " فرد";

        render();
    }

    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    function checkLogin() {
        if(document.getElementById('passInput').value === "1234") {
            isAdmin = true;
            closeLogin();
            document.getElementById('modeText').innerText = "✅ لوحة المدير";
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('exportBtn').style.display = 'inline-block';
            document.getElementById('prevBalanceEdit').style.display = 'block';
            render();
        } else { alert("خطأ!"); }
    }

    function render() {
        const container = document.getElementById('membersList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = '';

        const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        membersData.forEach((m, i) => {
            if(m.name.toLowerCase().includes(search)) {
                const card = document.createElement('div');
                card.className = `member-card ${m.paid ? 'paid-member' : ''} ${isAdmin ? 'admin-mode-card' : ''}`;
                
                // التعديل هنا: إضافة 1 لرب الأسرة
                const totalInFamily = 1 + (m.family ? m.family.length : 0);

                if(!isAdmin) {
                    let familyNames = m.family ? m.family.filter(n => n).join(" - ") : "لا يوجد أفراد مضافين";
                    card.innerHTML = `
                        <h3 style="margin-bottom:5px;">${m.name}</h3>
                        <p style="color:#2c3e50; font-weight:bold; margin-top:0; background:#f1c40f; display:inline-block; padding:2px 8px; border-radius:5px;">👪 مجموع أفراد الأسرة: ${totalInFamily}</p>
                        <div class="family-section">
                            <span class="family-title">أسماء الأفراد:</span>
                            <small>${familyNames}</small>
                        </div>
                        <hr>
                        <p><b>المبلغ الكلي:</b> ${Number(m.amount).toLocaleString()} د.ع</p>
                        <p><b>دفع عن شهر:</b> <span style="color:#8e44ad">${m.payMonth || 'لم يحدد'}</span></p>
                        <p><b>الحالة:</b> ${m.paid ? '<b style="color:green">✅ دافع</b>' : '<b style="color:red">❌ غير دافع</b>'}</p>
                    `;
                } else {
                    let monthOptions = `<option value="">اختر الشهر</option>`;
                    months.forEach(mon => {
                        monthOptions += `<option value="${mon}" ${m.payMonth === mon ? 'selected' : ''}>${mon}</option>`;
                    });

                    let familyInputs = '';
                    if(m.family) {
                        m.family.forEach((fName, fIdx) => {
                            familyInputs += `<input class="family-input" value="${fName}" placeholder="اسم الفرد" onchange="updateFamily(${i}, ${fIdx}, this.value)">`;
                        });
                    }

                    card.innerHTML = `
                        <label>رب الأسرة:</label>
                        <input class="edit-input" value="${m.name}" onchange="updateM(${i},'name',this.value)">
                        
                        <p style="color:#2980b9; font-weight:bold;">العدد الكلي (شامل رب الأسرة): ${totalInFamily}</p>
                        <div class="family-section">
                            <span class="family-title">إضافة أفراد العائلة:</span>
                            ${familyInputs}
                            <button class="btn-family" onclick="addFamilyMember(${i})">+ إضافة فرد</button>
                        </div>

                        <label>المبلغ الكلي:</label>
                        <input type="number" class="edit-input" value="${m.amount}" onchange="updateM(${i},'amount',this.value)">
                        
                        <label>دفع عن شهر:</label>
                        <select class="edit-input" onchange="updateM(${i},'payMonth',this.value)">
                            ${monthOptions}
                        </select>

                        <label>الحالة:</label>
                        <select class="edit-input" onchange="updateM(${i},'paid',this.value==='true')">
                            <option value="false" ${!m.paid?'selected':''}>غير دافع</option>
                            <option value="true" ${m.paid?'selected':''}>دافع</option>
                        </select>
                        <button class="btn-del" onclick="deleteM(${i})">حذف السجل</button>
                    `;
                }
                container.appendChild(card);
            }
        });

        if(isAdmin) {
            const b = document.createElement('button');
            b.className = 'btn-add'; b.innerText = '+ إضافة رب أسرة جديد';
            b.onclick = () => { 
                membersData.push({name:'اسم جديد', amount:0, paid:false, family:[], payMonth:''}); 
                db.ref('members').set(membersData); 
            };
            container.appendChild(b);
        }
    }

    function updateM(i, f, v) { membersData[i][f] = v; db.ref('members').set(membersData); }
    function addFamilyMember(memberIdx) {
        if(!membersData[memberIdx].family) membersData[memberIdx].family = [];
        membersData[memberIdx].family.push(""); 
        db.ref('members').set(membersData);
    }
    function updateFamily(memberIdx, familyIdx, value) {
        membersData[memberIdx].family[familyIdx] = value;
        db.ref('members').set(membersData);
    }
    function savePrevBalance() {
        const val = document.getElementById('prevBalanceIn').value;
        db.ref('financials_v2/prevBalance').set(Number(val));
        alert("تم تحديث الرصيد السابق بنجاح");
    }
    function deleteM(i) { if(confirm("هل أنت متأكد من الحذف؟")) { membersData.splice(i,1); db.ref('members').set(membersData); } }
</script>
</body>
</html>
