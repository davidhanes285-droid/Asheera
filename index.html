<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الصندوق المطور</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* التنسيقات البارزة الجديدة */
        .stat-card { padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        
        .previous-balance { background-color: #e3f2fd; border: 2px solid #2196f3; color: #0d47a1; font-size: 24px; font-weight: bold; }
        .monthly-payments { background-color: #e8f5e9; border: 2px solid #4caf50; color: #1b5e20; font-size: 24px; font-weight: bold; }
        .net-total { background-color: #fff3e0; border: 2px solid #ff9800; color: #e65100; font-size: 28px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #333; color: white; }

        /* تنسيقات حالة الدفع */
        .status-paid { background-color: #c8e6c9 !important; color: #256029; font-weight: bold; border: 2px solid #4caf50; }
        .status-unpaid { background-color: #ffcdd2 !important; color: #c62828; font-weight: bold; border: 2px solid #f44336; }

        .btn-delete { background-color: #ff5252; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-delete:hover { background-color: #d32f2f; }
        
        .form-group { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        button { cursor: pointer; padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">إدارة الصندوق المالي</h2>

    <div class="stat-card previous-balance">
        الرصيد السابق: <span id="display-prev-balance">0</span>
    </div>
    <div class="stat-card monthly-payments">
        مجموع دفعات الشهر: <span id="display-monthly-in">0</span>
    </div>
    <div class="stat-card net-total">
        صافي متوفر في الصندوق: <span id="display-net">0</span>
    </div>

    <hr>

    <div class="form-group">
        <h3>إضافة مصروف جديد</h3>
        <input type="text" id="expense-name" placeholder="بيان المصروف">
        <input type="number" id="expense-amount" placeholder="المبلغ">
        <button onclick="addExpense()">إضافة مصروف</button>
    </div>

    <h3>قائمة المصاريف</h3>
    <table id="expense-table">
        <thead>
            <tr>
                <th>البيان</th>
                <th>المبلغ</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="expense-list"></tbody>
    </table>

    <h3>حالة دفع الأعضاء</h3>
    <table id="members-table">
        <thead>
            <tr>
                <th>اسم العضو</th>
                <th>المبلغ المقرر</th>
                <th>الحالة</th>
                <th>تغيير الحالة</th>
            </tr>
        </thead>
        <tbody id="member-list">
            </tbody>
    </table>
</div>

<script>
    // بيانات تجريبية
    let prevBalance = 500;
    let members = [
        { id: 1, name: "أحمد محمد", amount: 100, paid: true },
        { id: 2, name: "سالم علي", amount: 100, paid: false },
        { id: 3, name: "خالد حسن", amount: 100, paid: true }
    ];
    let expenses = [];

    function updateUI() {
        // تحديث الرصيد السابق
        document.getElementById('display-prev-balance').innerText = prevBalance;

        // حساب مجموع دفعات الشهر (فقط للأعضاء الذين دفعوا)
        let monthlyIn = members.filter(m => m.paid).reduce((sum, m) => sum + m.amount, 0);
        document.getElementById('display-monthly-in').innerText = monthlyIn;

        // حساب المصاريف
        let totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);

        // الصافي النهائي
        let net = (prevBalance + monthlyIn) - totalExpenses;
        document.getElementById('display-net').innerText = net;

        // تحديث جدول الأعضاء مع الألوان المطلوبة
        const memberList = document.getElementById('member-list');
        memberList.innerHTML = '';
        members.forEach(m => {
            const rowClass = m.paid ? 'status-paid' : 'status-unpaid';
            memberList.innerHTML += `
                <tr class="${rowClass}">
                    <td>${m.name}</td>
                    <td>${m.amount}</td>
                    <td>${m.paid ? 'تم الدفع' : 'لم يدفع'}</td>
                    <td><button onclick="togglePaid(${m.id})">تبديل</button></td>
                </tr>
            `;
        });

        // تحديث جدول المصاريف
        const expenseList = document.getElementById('expense-list');
        expenseList.innerHTML = '';
        expenses.forEach((e, index) => {
            expenseList.innerHTML += `
                <tr>
                    <td>${e.name}</td>
                    <td>${e.amount}</td>
                    <td><button class="btn-delete" onclick="deleteExpense(${index})">حذف</button></td>
                </tr>
            `;
        });
    }

    function togglePaid(id) {
        let member = members.find(m => m.id === id);
        member.paid = !member.paid;
        updateUI();
    }

    function addExpense() {
        let name = document.getElementById('expense-name').value;
        let amount = parseFloat(document.getElementById('expense-amount').value);
        if(name && amount) {
            expenses.push({ name, amount });
            updateUI();
            document.getElementById('expense-name').value = '';
            document.getElementById('expense-amount').value = '';
        }
    }

    function deleteExpense(index) {
        if(confirm("هل أنت متأكد من حذف هذا المصروف؟")) {
            expenses.splice(index, 1);
            updateUI();
        }
    }

    // التشغيل الأول
    updateUI();
</script>

</body>
</html>
